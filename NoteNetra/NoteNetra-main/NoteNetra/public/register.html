<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteNetra - Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'indigo': {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                        'teal': {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                        },
                        'charcoal': {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="font-poppins bg-gradient-to-br from-charcoal-50 to-indigo-50 min-h-screen">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white bg-opacity-90 z-50 flex items-center justify-center hidden">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-charcoal-600 font-medium">Creating your account...</p>
        </div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-6xl bg-white rounded-3xl shadow-2xl overflow-hidden animate-fade-in">
            <div class="flex flex-col lg:flex-row min-h-[700px]">
                <!-- Left Column - Brand & Illustration -->
                <div class="lg:w-1/2 bg-gradient-to-br from-indigo-500 to-teal-500 p-8 lg:p-12 flex flex-col justify-center text-white relative overflow-hidden">
                    <!-- Background Pattern -->
                    <div class="absolute inset-0 opacity-10">
                        <div class="absolute top-0 left-0 w-32 h-32 bg-white rounded-full -translate-x-16 -translate-y-16"></div>
                        <div class="absolute bottom-0 right-0 w-24 h-24 bg-white rounded-full translate-x-12 translate-y-12"></div>
                        <div class="absolute top-1/2 left-1/4 w-16 h-16 bg-white rounded-full"></div>
                    </div>
                    
                    <!-- Logo -->
                    <div class="relative z-10 mb-8">
                        <div class="flex items-center space-x-3 mb-6">
                            <div class="w-12 h-12 bg-white bg-opacity-20 rounded-xl flex items-center justify-center">
                                <i class="fas fa-coins text-2xl"></i>
                            </div>
                            <span class="text-3xl font-bold">NoteNetra</span>
                        </div>
                        <h1 class="text-4xl lg:text-5xl font-bold mb-4">Join the Future</h1>
                        <p class="text-xl opacity-90 mb-8">Start your journey with intelligent financial management</p>
                    </div>

                    <!-- Benefits -->
                    <div class="relative z-10 space-y-4">
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-rocket text-sm"></i>
                            </div>
                            <span class="text-lg">Quick Setup</span>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-chart-pie text-sm"></i>
                            </div>
                            <span class="text-lg">Smart Analytics</span>
                        </div>
                        <div class="flex items-center space-x-3">
                            <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-mobile-alt text-sm"></i>
                            </div>
                            <span class="text-lg">Mobile First</span>
                        </div>
                    </div>
                </div>

                <!-- Right Column - Register Form -->
                <div class="lg:w-1/2 p-8 lg:p-12 flex items-center justify-center">
                    <div class="w-full max-w-md">
                        <!-- Header -->
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-bold text-charcoal-800 mb-2">Create Account</h2>
                            <p class="text-charcoal-600">Join thousands of MSMEs managing their finances smarter</p>
                        </div>

                        <!-- Error Message -->
                        <div id="error-message" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm"></div>

                        <!-- Register Form -->
                        <form id="registerForm" class="space-y-6">
                            <!-- Full Name Field -->
                            <div class="space-y-2">
                                <label for="fullName" class="block text-sm font-medium text-charcoal-700">Full Name</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-user text-charcoal-400"></i>
                                    </div>
                                    <input 
                                        type="text" 
                                        id="fullName" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200"
                                        placeholder="Enter your full name"
                                        required
                                    >
                                </div>
                            </div>

                            <!-- Email Field -->
                            <div class="space-y-2">
                                <label for="email" class="block text-sm font-medium text-charcoal-700">Email Address</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-envelope text-charcoal-400"></i>
                                    </div>
                                    <input 
                                        type="email" 
                                        id="email" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200"
                                        placeholder="Enter your email"
                                        required
                                    >
                                </div>
                            </div>

                            <!-- Business Type Field -->
                            <div class="space-y-2">
                                <label for="businessType" class="block text-sm font-medium text-charcoal-700">Business Type</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-store text-charcoal-400"></i>
                                    </div>
                                    <select 
                                        id="businessType" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 appearance-none bg-white"
                                        required
                                    >
                                        <option value="">Select business type</option>
                                        <option value="retail">Retail Store</option>
                                        <option value="restaurant">Restaurant</option>
                                        <option value="services">Services</option>
                                        <option value="manufacturing">Manufacturing</option>
                                        <option value="wholesale">Wholesale</option>
                                        <option value="other">Other</option>
                                    </select>
                                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                        <i class="fas fa-chevron-down text-charcoal-400"></i>
                                    </div>
                                </div>
                            </div>

                            <!-- UPI ID Field -->
                            <div class="space-y-2">
                                <label for="upiId" class="block text-sm font-medium text-charcoal-700">UPI ID (Optional)</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-qrcode text-charcoal-400"></i>
                                    </div>
                                    <input 
                                        type="text" 
                                        id="upiId" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200"
                                        placeholder="Enter your UPI ID"
                                    >
                                </div>
                            </div>

                            <!-- Password Field -->
                            <div class="space-y-2">
                                <label for="password" class="block text-sm font-medium text-charcoal-700">Password</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-lock text-charcoal-400"></i>
                                    </div>
                                    <input 
                                        type="password" 
                                        id="password" 
                                        class="w-full pl-10 pr-12 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200"
                                        placeholder="Create a password"
                                        required
                                    >
                                    <button 
                                        type="button" 
                                        id="togglePassword"
                                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-charcoal-400 hover:text-charcoal-600"
                                    >
                                        <i class="fas fa-eye" id="eyeIcon"></i>
                                    </button>
                                </div>
                                <p class="text-xs text-charcoal-500">Must be at least 8 characters long</p>
                            </div>

                            <!-- Confirm Password Field -->
                            <div class="space-y-2">
                                <label for="confirmPassword" class="block text-sm font-medium text-charcoal-700">Confirm Password</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-lock text-charcoal-400"></i>
                                    </div>
                                    <input 
                                        type="password" 
                                        id="confirmPassword" 
                                        class="w-full pl-10 pr-12 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200"
                                        placeholder="Confirm your password"
                                        required
                                    >
                                    <button 
                                        type="button" 
                                        id="toggleConfirmPassword"
                                        class="absolute inset-y-0 right-0 pr-3 flex items-center text-charcoal-400 hover:text-charcoal-600"
                                    >
                                        <i class="fas fa-eye" id="confirmEyeIcon"></i>
                                    </button>
                                </div>
                            </div>

                            <!-- Terms and Conditions -->
                            <div class="flex items-start space-x-3">
                                <input type="checkbox" id="terms" class="w-4 h-4 text-indigo-600 border-charcoal-300 rounded focus:ring-indigo-500 mt-1" required>
                                <label for="terms" class="text-sm text-charcoal-600">
                                    I agree to the 
                                    <a href="#" class="text-indigo-600 hover:text-indigo-700 font-medium">Terms of Service</a> 
                                    and 
                                    <a href="#" class="text-indigo-600 hover:text-indigo-700 font-medium">Privacy Policy</a>
                                </label>
                            </div>

                            <!-- Create Account Button -->
                            <button 
                                type="submit" 
                                id="registerButton"
                                class="w-full bg-gradient-to-r from-indigo-500 to-indigo-600 text-white py-3 px-6 rounded-xl font-semibold hover:from-indigo-600 hover:to-indigo-700 transform hover:-translate-y-0.5 transition-all duration-200 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                Create Account
                            </button>
                        </form>

                        <!-- Login Link -->
                        <div class="text-center mt-8">
                            <p class="text-charcoal-600">
                                Already have an account? 
                                <a href="login.html" class="text-indigo-600 hover:text-indigo-700 font-semibold">
                                    Sign In
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fade-in 0.8s ease-out;
        }

        /* Form validation styles */
        .input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.1) !important;
        }

        .input-success {
            border-color: #22c55e !important;
            box-shadow: 0 0 0 2px rgba(34, 197, 94, 0.1) !important;
        }
    </style>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { ref, set } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // Clear any stored data
        localStorage.clear();
        sessionStorage.clear();

        // DOM Elements
        const registerForm = document.getElementById('registerForm');
        const errorMessage = document.getElementById('error-message');
        const registerButton = document.getElementById('registerButton');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const togglePassword = document.getElementById('togglePassword');
        const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
        const eyeIcon = document.getElementById('eyeIcon');
        const confirmEyeIcon = document.getElementById('confirmEyeIcon');

        // Password Toggle Functions
        togglePassword.addEventListener('click', () => {
            const passwordInput = document.getElementById('password');
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            eyeIcon.classList.toggle('fa-eye');
            eyeIcon.classList.toggle('fa-eye-slash');
        });

        toggleConfirmPassword.addEventListener('click', () => {
            const confirmPasswordInput = document.getElementById('confirmPassword');
            const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmPasswordInput.setAttribute('type', type);
            confirmEyeIcon.classList.toggle('fa-eye');
            confirmEyeIcon.classList.toggle('fa-eye-slash');
        });

        // Form Validation Functions
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            registerButton.disabled = false;
            loadingOverlay.classList.add('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        function validateField(input, validationFn) {
            const isValid = validationFn(input.value);
            input.classList.remove('input-error', 'input-success');
            
            if (input.value === '') {
                return true; // Don't show validation for empty fields
            }
            
            if (isValid) {
                input.classList.add('input-success');
            } else {
                input.classList.add('input-error');
            }
            
            return isValid;
        }

        // Validation functions
        const validations = {
            email: (value) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value),
            password: (value) => value.length >= 8,
            confirmPassword: (value) => {
                const password = document.getElementById('password').value;
                return value === password && value.length >= 8;
            },
            fullName: (value) => value.length >= 2,
            businessType: (value) => value !== '',
            upiId: (value) => value === '' || /^[a-zA-Z0-9._-]+@[a-zA-Z]{2,}$/.test(value)
        };

        // Add validation listeners
        Object.keys(validations).forEach(fieldName => {
            const input = document.getElementById(fieldName);
            if (input) {
                input.addEventListener('blur', () => {
                    validateField(input, validations[fieldName]);
                });
                input.addEventListener('input', () => {
                    if (input.classList.contains('input-error') || input.classList.contains('input-success')) {
                        validateField(input, validations[fieldName]);
                    }
                });
            }
        });

        // Special handling for confirm password
        document.getElementById('password').addEventListener('input', () => {
            const confirmPassword = document.getElementById('confirmPassword');
            if (confirmPassword.value) {
                validateField(confirmPassword, validations.confirmPassword);
            }
        });

        // Handle Register Form Submission
        registerForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError();

            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const businessType = document.getElementById('businessType').value;
            const upiId = document.getElementById('upiId').value.trim();
            const terms = document.getElementById('terms').checked;

            // Validate all fields
            const fields = [
                { input: document.getElementById('fullName'), validation: validations.fullName },
                { input: document.getElementById('email'), validation: validations.email },
                { input: document.getElementById('password'), validation: validations.password },
                { input: document.getElementById('confirmPassword'), validation: validations.confirmPassword },
                { input: document.getElementById('businessType'), validation: validations.businessType },
                { input: document.getElementById('upiId'), validation: validations.upiId }
            ];

            let isValid = true;
            fields.forEach(field => {
                if (!validateField(field.input, field.validation)) {
                    isValid = false;
                }
            });

            if (!terms) {
                showError('Please accept the terms and conditions');
                return;
            }

            if (!isValid) {
                showError('Please fix the errors in the form');
                return;
            }

            if (password !== confirmPassword) {
                showError('Passwords do not match');
                return;
            }

            // Disable button and show loading
            registerButton.disabled = true;
            loadingOverlay.classList.remove('hidden');

            try {
                // Create user account
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // Store user data in Realtime Database
                await set(ref(db, `users/${user.uid}`), {
                    fullName: fullName,
                    email: email,
                    businessType: businessType,
                    upiId: upiId,
                    createdAt: Date.now(),
                    profileCompleted: false
                });

                // Redirect to profile setup
                window.location.href = 'profile-setup.html';
            } catch (error) {
                console.error('Registration error:', error);
                loadingOverlay.classList.add('hidden');
                registerButton.disabled = false;

                if (error.code === 'auth/email-already-in-use') {
                    showError('This email is already registered. Please login instead.');
                } else if (error.code === 'auth/weak-password') {
                    showError('Password should be at least 8 characters long.');
                } else {
                    showError('An error occurred. Please try again.');
                }
            }
        });

        // Clear error when user starts typing
        registerForm.addEventListener('input', hideError);
    </script>
</body>
</html>
