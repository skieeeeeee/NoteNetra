<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteNetra - Complete Your Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'poppins': ['Poppins', 'sans-serif'],
                    },
                    colors: {
                        'indigo': {
                            50: '#eef2ff',
                            100: '#e0e7ff',
                            500: '#6366f1',
                            600: '#4f46e5',
                            700: '#4338ca',
                            900: '#312e81',
                        },
                        'teal': {
                            50: '#f0fdfa',
                            100: '#ccfbf1',
                            500: '#14b8a6',
                            600: '#0d9488',
                            700: '#0f766e',
                        },
                        'charcoal': {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            200: '#e2e8f0',
                            300: '#cbd5e1',
                            400: '#94a3b8',
                            500: '#64748b',
                            600: '#475569',
                            700: '#334155',
                            800: '#1e293b',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>
</head>

<body class="font-poppins bg-gradient-to-br from-charcoal-50 to-indigo-50 min-h-screen">
    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-white bg-opacity-90 z-50 flex items-center justify-center hidden">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-charcoal-600 font-medium">Setting up your profile...</p>
        </div>
    </div>

    <div class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-4xl bg-white rounded-3xl shadow-2xl overflow-hidden animate-fade-in">
            <div class="flex flex-col lg:flex-row min-h-[600px]">
                <!-- Left Column - Progress & Info -->
                <div class="lg:w-1/2 bg-gradient-to-br from-indigo-500 to-teal-500 p-8 lg:p-12 flex flex-col justify-center text-white relative overflow-hidden">
                    <!-- Background Pattern -->
                    <div class="absolute inset-0 opacity-10">
                        <div class="absolute top-0 left-0 w-32 h-32 bg-white rounded-full -translate-x-16 -translate-y-16"></div>
                        <div class="absolute bottom-0 right-0 w-24 h-24 bg-white rounded-full translate-x-12 translate-y-12"></div>
                        <div class="absolute top-1/2 left-1/4 w-16 h-16 bg-white rounded-full"></div>
                    </div>
                    
                    <!-- Progress -->
                    <div class="relative z-10 mb-8">
                        <div class="flex items-center space-x-3 mb-6">
                            <div class="w-12 h-12 bg-white bg-opacity-20 rounded-xl flex items-center justify-center">
                                <i class="fas fa-user-plus text-2xl"></i>
                            </div>
                            <span class="text-3xl font-bold">Complete Profile</span>
                        </div>
                        <h1 class="text-4xl lg:text-5xl font-bold mb-4">Almost There!</h1>
                        <p class="text-xl opacity-90 mb-8">Let's set up your business profile to get you started</p>
                    </div>

                    <!-- Progress Steps -->
                    <div class="relative z-10 space-y-6">
                        <div class="flex items-center space-x-4">
                            <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-check text-sm"></i>
                            </div>
                            <span class="text-lg">Account Created</span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-edit text-sm"></i>
                            </div>
                            <span class="text-lg">Business Details</span>
                        </div>
                        <div class="flex items-center space-x-4">
                            <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-cog text-sm"></i>
                            </div>
                            <span class="text-lg">Preferences</span>
                        </div>
                        <div class="flex items-center space-x-4 opacity-50">
                            <div class="w-8 h-8 bg-white bg-opacity-20 rounded-lg flex items-center justify-center">
                                <i class="fas fa-rocket text-sm"></i>
                            </div>
                            <span class="text-lg">Ready to Go!</span>
                        </div>
                    </div>
                </div>

                <!-- Right Column - Profile Setup Form -->
                <div class="lg:w-1/2 p-8 lg:p-12 flex items-center justify-center">
                    <div class="w-full max-w-md">
                        <!-- Header -->
                        <div class="text-center mb-8">
                            <h2 class="text-3xl font-bold text-charcoal-800 mb-2">Business Profile</h2>
                            <p class="text-charcoal-600">Tell us more about your business</p>
                        </div>

                        <!-- Error Message -->
                        <div id="error-message" class="hidden mb-6 p-4 bg-red-50 border border-red-200 rounded-xl text-red-700 text-sm"></div>

                        <!-- Profile Setup Form -->
                        <form id="profileSetupForm" class="space-y-6">
                            <!-- Business Name -->
                            <div class="space-y-2">
                                <label for="businessName" class="block text-sm font-medium text-charcoal-700">Business Name</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-store text-charcoal-400"></i>
                                    </div>
                                    <input 
                                        type="text" 
                                        id="businessName" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200"
                                        placeholder="Enter your business name"
                                        required
                                    >
                                </div>
                            </div>

                            <!-- Business Address -->
                            <div class="space-y-2">
                                <label for="businessAddress" class="block text-sm font-medium text-charcoal-700">Business Address</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-map-marker-alt text-charcoal-400"></i>
                                    </div>
                                    <textarea 
                                        id="businessAddress" 
                                        rows="3"
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 resize-none"
                                        placeholder="Enter your business address"
                                        required
                                    ></textarea>
                                </div>
                            </div>

                            <!-- Phone Number -->
                            <div class="space-y-2">
                                <label for="phoneNumber" class="block text-sm font-medium text-charcoal-700">Phone Number</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-phone text-charcoal-400"></i>
                                    </div>
                                    <input 
                                        type="tel" 
                                        id="phoneNumber" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200"
                                        placeholder="Enter your phone number"
                                        required
                                    >
                                </div>
                            </div>

                            <!-- GST Number (Optional) -->
                            <div class="space-y-2">
                                <label for="gstNumber" class="block text-sm font-medium text-charcoal-700">GST Number (Optional)</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-receipt text-charcoal-400"></i>
                                    </div>
                                    <input 
                                        type="text" 
                                        id="gstNumber" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200"
                                        placeholder="Enter your GST number"
                                    >
                                </div>
                            </div>

                            <!-- Currency Preference -->
                            <div class="space-y-2">
                                <label for="currency" class="block text-sm font-medium text-charcoal-700">Currency Preference</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-rupee-sign text-charcoal-400"></i>
                                    </div>
                                    <select 
                                        id="currency" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 appearance-none bg-white"
                                        required
                                    >
                                        <option value="">Select currency</option>
                                        <option value="INR" selected>Indian Rupee (₹)</option>
                                        <option value="USD">US Dollar ($)</option>
                                        <option value="EUR">Euro (€)</option>
                                    </select>
                                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                        <i class="fas fa-chevron-down text-charcoal-400"></i>
                                    </div>
                                </div>
                            </div>

                            <!-- Time Zone -->
                            <div class="space-y-2">
                                <label for="timezone" class="block text-sm font-medium text-charcoal-700">Time Zone</label>
                                <div class="relative">
                                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <i class="fas fa-clock text-charcoal-400"></i>
                                    </div>
                                    <select 
                                        id="timezone" 
                                        class="w-full pl-10 pr-4 py-3 border border-charcoal-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-all duration-200 appearance-none bg-white"
                                        required
                                    >
                                        <option value="">Select timezone</option>
                                        <option value="Asia/Kolkata" selected>India Standard Time (IST)</option>
                                        <option value="Asia/Dubai">Gulf Standard Time (GST)</option>
                                        <option value="Asia/Singapore">Singapore Time (SGT)</option>
                                    </select>
                                    <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                                        <i class="fas fa-chevron-down text-charcoal-400"></i>
                                    </div>
                                </div>
                            </div>

                            <!-- Complete Setup Button -->
                            <button 
                                type="submit" 
                                id="completeSetupButton"
                                class="w-full bg-gradient-to-r from-indigo-500 to-indigo-600 text-white py-3 px-6 rounded-xl font-semibold hover:from-indigo-600 hover:to-indigo-700 transform hover:-translate-y-0.5 transition-all duration-200 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                                Complete Setup
                            </button>
                        </form>

                        <!-- Skip for now -->
                        <div class="text-center mt-6">
                            <button id="skipSetup" class="text-charcoal-500 hover:text-charcoal-700 text-sm font-medium">
                                Skip for now
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in {
            animation: fade-in 0.8s ease-out;
        }
    </style>

    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { ref, update, get } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // DOM Elements
        const profileSetupForm = document.getElementById('profileSetupForm');
        const errorMessage = document.getElementById('error-message');
        const completeSetupButton = document.getElementById('completeSetupButton');
        const skipSetup = document.getElementById('skipSetup');
        const loadingOverlay = document.getElementById('loadingOverlay');

        // Check if user is authenticated
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                // Redirect to login if not authenticated
                window.location.href = 'login.html';
            }
        });

        // Show/Hide Error
        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('hidden');
            completeSetupButton.disabled = false;
            loadingOverlay.classList.add('hidden');
        }

        function hideError() {
            errorMessage.classList.add('hidden');
        }

        // Handle Profile Setup Form Submission
        profileSetupForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            hideError();

            const businessName = document.getElementById('businessName').value.trim();
            const businessAddress = document.getElementById('businessAddress').value.trim();
            const phoneNumber = document.getElementById('phoneNumber').value.trim();
            const gstNumber = document.getElementById('gstNumber').value.trim();
            const currency = document.getElementById('currency').value;
            const timezone = document.getElementById('timezone').value;

            if (!businessName || !businessAddress || !phoneNumber || !currency || !timezone) {
                showError('Please fill in all required fields');
                return;
            }

            // Disable button and show loading
            completeSetupButton.disabled = true;
            loadingOverlay.classList.remove('hidden');

            try {
                const user = auth.currentUser;
                if (!user) {
                    throw new Error('User not authenticated');
                }

                // Update user profile in database
                await update(ref(db, `users/${user.uid}`), {
                    businessName: businessName,
                    businessAddress: businessAddress,
                    phoneNumber: phoneNumber,
                    gstNumber: gstNumber,
                    currency: currency,
                    timezone: timezone,
                    profileCompleted: true,
                    profileCompletedAt: Date.now()
                });

                // Redirect to dashboard
                window.location.href = 'dashboard-enhanced.html';
            } catch (error) {
                console.error('Profile setup error:', error);
                showError('An error occurred. Please try again.');
            }
        });

        // Handle Skip Setup
        skipSetup.addEventListener('click', async () => {
            try {
                const user = auth.currentUser;
                if (user) {
                    // Mark profile as completed without additional details
                    await update(ref(db, `users/${user.uid}`), {
                        profileCompleted: true,
                        profileCompletedAt: Date.now()
                    });
                }
                window.location.href = 'dashboard-enhanced.html';
            } catch (error) {
                console.error('Skip setup error:', error);
                window.location.href = 'dashboard-enhanced.html';
            }
        });

        // Clear error when user starts typing
        profileSetupForm.addEventListener('input', hideError);
    </script>
</body>
</html>
